name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        # Reference: https://github.com/orgs/community/discussions/26944#discussioncomment-10256620
        # How to fix ANSI color codes w/ GH actions:
        shell: 'script -q -e -c "export TERM=xterm-256color; bash --noprofile --norc -eo pipefail {0}"'
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: setup.py

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
          python -m pip check

      - name: Compile package
        run: python -m compileall -q pyVoIP

      - name: Run pytest
        run: python -m pytest

  package:
    name: Build package
    runs-on: ubuntu-latest
    defaults:
      run:
        # Reference: https://github.com/orgs/community/discussions/26944#discussioncomment-10256620
        # How to fix ANSI color codes w/ GH actions:
        shell: 'script -q -e -c "export TERM=xterm-256color; bash --noprofile --norc -eo pipefail {0}"'
    needs: pytest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: setup.py

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check --strict dist/*
