# This workflow will install Python dependencies, run tests and lint
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: pytest in Docker

on:
  push:
    branches:
      - "master"
  pull_request:

jobs:
  check-pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Reference: https://github.com/orgs/community/discussions/26944#discussioncomment-10256620
        # How to fix ANSI color codes w/ GH actions:
        shell: 'script -q -e -c "export TERM=xterm-256color; bash --noprofile --norc -eo pipefail {0}"'
    strategy:
      matrix:
        python-version:
          - "3.14"

    steps:
      - uses: actions/checkout@v3.0.2
        with:
          fetch-depth: 2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements-dev.txt
      - name: Start Docker
        run: |
          docker build docker -t pyvoip/tests
          docker run -d -p 5060:5060/udp pyvoip/tests
      - name: pytest
        run: pytest --check-func
